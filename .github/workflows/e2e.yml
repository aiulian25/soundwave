name: E2E

# Heavy (full stack + browser), so run on demand and on PRs — not every push.
on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Test-only secrets for the ephemeral stack (never used in production).
      SW_PASSWORD: 'E2e-Admin_2026!'
      POSTGRES_PASSWORD: e2e_pg_pw
      REDIS_PASSWORD: e2e_redis_pw
      ELASTIC_PASSWORD: e2e_es_pw
      DJANGO_SECRET_KEY: e2e-secret-key-not-for-production
      ALLOW_LOCAL_NETWORK: 'true'
      E2E_USERNAME: e2e_user
      E2E_PASSWORD: 'E2e-Test_2026!'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build app image
        run: docker build -t ghcr.io/aiulian25/soundwave:main .

      - name: Create runtime dirs + cookies file
        # The container runs as uid 1000; make the bind-mounted dirs writable by it.
        run: mkdir -p audio cache data && touch cookies.txt && sudo chown -R 1000:1000 audio cache data

      - name: Start the stack
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Wait for the app to be ready
        run: |
          for i in $(seq 1 48); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8889/api/ping/ || true)
            if [ "$code" = "200" ]; then echo "app is up"; exit 0; fi
            sleep 5
          done
          echo "app did not become ready"; docker compose -f docker-compose.prod.yml logs --tail=120 soundwave; exit 1

      - name: Seed e2e data (user + playable track)
        run: docker exec soundwave python manage.py seed_e2e

      - name: Install Playwright browser
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: ./frontend
        env:
          E2E_BASE_URL: http://localhost:8889
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: App logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs --tail=150 soundwave

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
