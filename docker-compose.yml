#version: '3.8'

services:
  soundwave:
    container_name: soundwave
    # Option 1: Pull from GitHub Container Registry (recommended for users)
    # image: ghcr.io/aiulian25/soundwave:main
    # Option 2: Build locally (uncomment if pulling fails or for development)
    build:
      context: .
      dockerfile: Dockerfile
    user: "1000:1000"  # Run as host user to prevent file ownership issues
    # Security: drop all capabilities and prevent privilege escalation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8889:8888"
    volumes:
      - ./audio:/app/audio
      - ./cache:/app/cache
      - ./data:/app/data
      - ./backend:/app/backend  # Mount backend for development
      - ./backend/staticfiles:/app/backend/staticfiles
      - ./frontend/dist:/app/frontend/dist  # Mount frontend for development
    environment:
      - SW_HOST=http://localhost:8889
      - SW_USERNAME=admin
      - SW_PASSWORD=soundwave
      - ELASTIC_PASSWORD=soundwave
      - POSTGRES_DB=soundwave
      - POSTGRES_USER=soundwave
      - POSTGRES_PASSWORD=soundwave
      - POSTGRES_HOST=soundwave-pg
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://soundwave:soundwave@soundwave-pg:5432/soundwave
      - REDIS_HOST=soundwave-redis
      - TZ=UTC
      - ES_URL=http://soundwave-es:9200
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8889}
      - SECURE_COOKIES=${SECURE_COOKIES:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.1.80}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in environment}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
    depends_on:
      soundwave-es:
        condition: service_healthy
      soundwave-pg:
        condition: service_healthy
      soundwave-redis:
        condition: service_healthy
    restart: unless-stopped

  soundwave-pg:
    image: postgres:16-alpine
    container_name: soundwave-pg
    restart: unless-stopped
    environment:
      - POSTGRES_DB=soundwave
      - POSTGRES_USER=soundwave
      - POSTGRES_PASSWORD=soundwave
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundwave -d soundwave"]
      interval: 10s
      timeout: 5s
      retries: 5

  soundwave-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: soundwave-es
    restart: unless-stopped
    environment:
      - ELASTIC_PASSWORD=soundwave
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=95%
      - cluster.routing.allocation.disk.watermark.high=97%
      - cluster.routing.allocation.disk.watermark.flood_stage=99%
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:soundwave http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  soundwave-redis:
    image: redis:alpine
    container_name: soundwave-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  es_data:
  pg_data:
  redis_data:
