# Production docker-compose for users pulling from GitHub Container Registry
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  soundwave:
    container_name: soundwave
    image: ghcr.io/aiulian25/soundwave:main
    user: "1000:1000"
    ports:
      - "8889:8888"
    # Security: drop all capabilities and prevent privilege escalation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem; only allow writes where needed
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
      - /run:noexec,nosuid,size=64m
    volumes:
      # Only mount data directories - NOT code directories
      - ./audio:/app/audio
      - ./cache:/app/cache
      - ./data:/app/data
      - ./cookies.txt:/app/cookies.txt:ro
    # Resource limits to reduce DoS risk
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
          cpus: "0.5"
    environment:
      - SW_HOST=${SW_HOST:-http://localhost:8889}
      - SW_USERNAME=${SW_USERNAME:-admin}
      - SW_PASSWORD=${SW_PASSWORD:?SW_PASSWORD must be set in .env}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - POSTGRES_DB=${POSTGRES_DB:-soundwave}
      - POSTGRES_USER=${POSTGRES_USER:-soundwave}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - POSTGRES_HOST=soundwave-pg
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://${POSTGRES_USER:-soundwave}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@soundwave-pg:5432/${POSTGRES_DB:-soundwave}
      - REDIS_HOST=soundwave-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      - TZ=${TZ:-UTC}
      - ES_URL=http://soundwave-es:9200
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8889}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - ALLOW_LOCAL_NETWORK=${ALLOW_LOCAL_NETWORK:-false}
      - SECURE_COOKIES=${SECURE_COOKIES:-auto}
      - TOKEN_EXPIRY_HOURS=${TOKEN_EXPIRY_HOURS:-168}
      - SW_AUTO_UPDATE_YTDLP=${SW_AUTO_UPDATE_YTDLP:-false}
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
    depends_on:
      soundwave-es:
        condition: service_healthy
      soundwave-pg:
        condition: service_healthy
      soundwave-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api/ping/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  soundwave-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: soundwave-es
    restart: unless-stopped
    # Security hardening for Elasticsearch
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 1g
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD must be set in .env}
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=95%
      - cluster.routing.allocation.disk.watermark.high=97%
      - cluster.routing.allocation.disk.watermark.flood_stage=99%
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend

  soundwave-pg:
    image: postgres:16-alpine
    container_name: soundwave-pg
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-soundwave}
      - POSTGRES_USER=${POSTGRES_USER:-soundwave}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  soundwave-redis:
    image: redis:alpine
    container_name: soundwave-redis
    restart: unless-stopped
    # Security hardening for Redis
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    # Require authentication
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env} --maxmemory 200mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge
    internal: false  # Main app needs external access for port publishing

volumes:
  es_data:
  pg_data:
  redis_data:
